<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="語音輸入">
    <meta name="theme-color" content="#667eea">
    
    <title>廣東話語音助手 v2.2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.98);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 768px) {
            .container { max-width: 600px; min-height: 90vh; margin: 20px auto; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        }

        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; text-align: center; position: sticky; top: 0; z-index: 100; }
        .header h1 { font-size: 1.3em; margin-bottom: 5px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .header p { opacity: 0.8; font-size: 0.8em; }

        .main-content { padding: 15px; flex: 1; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }

        .warning-box { background: #fff3cd; border: 1px solid #ffeaa7; border-radius: 10px; padding: 12px; font-size: 0.85em; color: #856404; display: none; margin-bottom: 10px; }
        .warning-box.show { display: block; }

        .stats { display: flex; gap: 10px; }
        .stat-box { background: #f8f9fa; border: 1px solid #eee; padding: 10px; border-radius: 12px; flex: 1; text-align: center; }
        .stat-box .number { font-size: 1.4em; font-weight: bold; color: #667eea; }
        .stat-box .label { font-size: 0.7em; color: #666; text-transform: uppercase; }

        .mic-section { text-align: center; padding: 20px 0; background: #fdfdfd; border-radius: 20px; border: 1px dashed #ddd; margin: 5px 0; }
        .mic-button {
            width: 85px; height: 85px; border-radius: 50%; border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; font-size: 32px; cursor: pointer;
            box-shadow: 0 6px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.2s; position: relative; touch-action: manipulation;
        }
        .mic-button:active { transform: scale(0.9); }
        .mic-button.recording { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(245, 87, 108, 0.6); }
            70% { box-shadow: 0 0 0 15px rgba(245, 87, 108, 0); }
            100% { box-shadow: 0 0 0 0 rgba(245, 87, 108, 0); }
        }

        .status { margin-top: 10px; font-size: 0.9em; color: #666; font-weight: 500; }
        .status.recording { color: #f5576c; }

        .input-display {
            background: #fff; border: 2px solid #f0f0f0; border-radius: 15px; padding: 15px;
            font-size: 1.1em; line-height: 1.6; color: #333; min-height: 120px; max-height: 200px;
            overflow-y: auto; -webkit-overflow-scrolling: touch; outline: none;
        }
        .input-display:empty:before { content: "點擊開始錄音..."; color: #ccc; }
        .char-count { text-align: right; font-size: 0.75em; color: #999; margin-top: 4px; }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn {
            padding: 12px; border: none; border-radius: 12px; cursor: pointer;
            font-size: 0.95em; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-success { background: #2ecc71; color: white; }
        .btn-secondary { background: #f0f0f0; color: #555; }
        .btn-danger { background: #fee; color: #e74c3c; }
        .btn-full { grid-column: 1 / -1; }

        .history-section { border-top: 1px solid #eee; padding-top: 15px; margin-top: 10px; }
        .history-item { background: #f9f9f9; padding: 12px; margin-bottom: 8px; border-radius: 10px; position: relative; }
        .history-item .date { font-size: 0.7em; color: #999; margin-bottom: 4px; }
        .history-item .text { font-size: 0.95em; color: #444; padding-right: 60px; }
        .history-item .actions { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; }
        
        .icon-btn { width: 30px; height: 30px; border-radius: 50%; border: none; color: white; font-size: 14px; cursor: pointer; }
        .icon-btn.copy { background: #2ecc71; }
        .icon-btn.delete { background: #e74c3c; }

        .toast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white; padding: 10px 20px;
            border-radius: 30px; font-size: 0.85em; opacity: 0; transition: 0.3s; z-index: 1000;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>🎤 廣東話語音輸入</h1>
            <p>無聲自動暫停 | 支援分享及安裝</p>
        </div>

        <div class="main-content">
            <div id="warningBox" class="warning-box">⚠️ <span id="warningText"></span></div>

            <div class="stats">
                <div class="stat-box"><div class="number" id="totalCount">0</div><div class="label">總記錄</div></div>
                <div class="stat-box"><div class="number" id="todayCount">0</div><div class="label">今日</div></div>
            </div>

            <div class="mic-section">
                <button class="mic-button" id="micBtn">🎙️</button>
                <div class="status" id="status">點擊按鈕說話</div>
            </div>

            <div class="input-wrapper">
                <div class="input-display" id="inputDisplay" contenteditable="true"></div>
                <div class="char-count" id="charCount">0 字</div>
            </div>

            <div class="controls">
                <button class="btn btn-primary" onclick="saveToHistory()">💾 儲存</button>
                <button class="btn btn-success" onclick="shareText()">📤 分享</button>
                <button class="btn btn-secondary" onclick="copyText()">📋 複製</button>
                <button class="btn btn-secondary" onclick="clearInput()">🗑️ 清空</button>
                <button class="btn btn-danger btn-full" onclick="clearAllHistory()">⚠️ 刪除所有歷史記錄</button>
            </div>

            <div class="history-section">
                <div id="historyList"></div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // 註冊 PWA Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log(err));
        }

        // 變數定義
        let recognition = null;
        let isRecording = false;
        let finalTranscript = '';
        let interimTranscript = '';
        let silenceTimer = null;
        let wakeLock = null;
        const SILENCE_TIMEOUT = 3000; // 3秒靜音自動停止
        const STORAGE_KEY = 'cantonese_voice_v2';

        const micBtn = document.getElementById('micBtn');
        const status = document.getElementById('status');
        const inputDisplay = document.getElementById('inputDisplay');
        const charCount = document.getElementById('charCount');

        // 初始化語音辨識
        function initRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                showWarning('此瀏覽器不支援語音功能。iOS 請用 Safari，Android 請用 Chrome。');
                return false;
            }

            recognition = new SpeechRecognition();
            recognition.continuous = false; // 手機版建議設為 false，靠代碼邏輯控制重啟
            recognition.interimResults = true;
            recognition.lang = 'zh-HK';

            recognition.onstart = () => {
                isRecording = true;
                micBtn.classList.add('recording');
                status.textContent = '🔴 正在聆聽...';
                status.classList.add('recording');
                if (navigator.vibrate) navigator.vibrate(50);
                startSilenceTimer();
            };

            recognition.onend = () => {
                isRecording = false;
                micBtn.classList.remove('recording');
                
                // 處理結尾文字
                if (interimTranscript) {
                    finalTranscript += interimTranscript;
                    interimTranscript = '';
                    updateDisplay();
                }

                // 如果是手動「自動重啟」模式（未觸發靜音停止時）
                if (micBtn.classList.contains('auto-restart')) {
                    recognition.start();
                } else {
                    status.textContent = '已暫停';
                    status.classList.remove('recording');
                    releaseWakeLock();
                }
            };

            recognition.onresult = (event) => {
                resetSilenceTimer(); // 只要有聲音，就重置計時器
                
                interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const result = event.results[i][0].transcript;
                    if (event.results[i].isFinal) finalTranscript += result;
                    else interimTranscript += result;
                }
                updateDisplay();
            };

            recognition.onerror = (event) => {
                console.log('Recognition Error:', event.error);
                if (event.error === 'no-speech') {
                    stopRecording(); // 沒聲音直接徹底停止
                    showToast('沒偵測到聲音，已自動停止');
                }
            };

            return true;
        }

        // 靜音計時器邏輯
        function startSilenceTimer() {
            clearTimeout(silenceTimer);
            silenceTimer = setTimeout(() => {
                if (isRecording) {
                    stopRecording();
                    showToast('太久沒說話，已自動停止');
                }
            }, SILENCE_TIMEOUT);
        }

        function resetSilenceTimer() {
            if (isRecording) startSilenceTimer();
        }

        // 顯示更新
        function updateDisplay() {
            const fullText = finalTranscript + interimTranscript;
            inputDisplay.textContent = fullText;
            charCount.textContent = fullText.length + ' 字';
            sessionStorage.setItem('draft', fullText);
        }

        // 錄音控制
        async function startRecording() {
            if (!recognition && !initRecognition()) return;
            finalTranscript = inputDisplay.textContent;
            micBtn.classList.add('auto-restart');
            try {
                await requestWakeLock();
                recognition.start();
            } catch (e) { console.error(e); }
        }

        function stopRecording() {
            micBtn.classList.remove('auto-restart');
            clearTimeout(silenceTimer);
            if (recognition) recognition.stop();
            releaseWakeLock();
        }

        micBtn.addEventListener('click', () => {
            if (isRecording) stopRecording();
            else startRecording();
        });

        // 功能函數
        async function shareText() {
            const text = inputDisplay.textContent.trim();
            if (!text) return showToast('內容為空');
            if (navigator.share) {
                try { await navigator.share({ title: '語音輸入', text: text }); } catch(e){}
            } else { copyText(); showToast('瀏覽器不支援分享，已改為複製'); }
        }

        function copyText() {
            const text = inputDisplay.textContent;
            navigator.clipboard.writeText(text).then(() => showToast('✅ 已複製'));
        }

        function clearInput() {
            finalTranscript = ''; interimTranscript = '';
            inputDisplay.textContent = ''; charCount.textContent = '0 字';
            sessionStorage.removeItem('draft');
        }

        // 歷史記錄管理
        function saveToHistory() {
            const text = inputDisplay.textContent.trim();
            if (!text) return showToast('沒內容可儲存');
            const records = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            records.unshift({
                id: Date.now(),
                text: text,
                date: new Date().toLocaleString('zh-HK', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })
            });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(records.slice(0, 50))); // 只存50條
            renderHistory();
            updateStats();
            showToast('💾 已儲存');
        }

        function renderHistory() {
            const records = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            const list = document.getElementById('historyList');
            if (records.length === 0) { list.innerHTML = '<p style="text-align:center;color:#999;padding:20px;">暫無記錄</p>'; return; }
            list.innerHTML = records.map(r => `
                <div class="history-item">
                    <div class="date">${r.date} | ${r.text.length}字</div>
                    <div class="text">${r.text}</div>
                    <div class="actions">
                        <button class="icon-btn copy" onclick="navigator.clipboard.writeText('${r.text.replace(/'/g, "\\'")}');showToast('已複製')">📋</button>
                        <button class="icon-btn delete" onclick="deleteRecord(${r.id})">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        function deleteRecord(id) {
            const records = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            localStorage.setItem(STORAGE_KEY, JSON.stringify(records.filter(r => r.id !== id)));
            renderHistory();
            updateStats();
        }

        function clearAllHistory() {
            if (confirm('確定刪除所有歷史記錄嗎？')) {
                localStorage.removeItem(STORAGE_KEY);
                renderHistory();
                updateStats();
            }
        }

        // 設備功能調用
        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
            }
        }
        function releaseWakeLock() {
            if (wakeLock) { wakeLock.release().then(() => wakeLock = null); }
        }

        function updateStats() {
            const records = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            document.getElementById('totalCount').textContent = records.length;
            const today = new Date().toDateString();
            document.getElementById('todayCount').textContent = records.filter(r => new Date(r.id).toDateString() === today).length;
        }

        function showToast(m) {
            const t = document.getElementById('toast'); t.textContent = m;
            t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000);
        }

        function showWarning(t) {
            const b = document.getElementById('warningBox'); document.getElementById('warningText').textContent = t;
            b.classList.add('show');
        }

        // 初始化載入
        window.onload = () => {
            const draft = sessionStorage.getItem('draft');
            if (draft) { finalTranscript = draft; updateDisplay(); }
            renderHistory();
            updateStats();
            // 檢查是否為 iOS Safari
            const ua = navigator.userAgent;
            const isIOS = /iPhone|iPad|iPod/.test(ua);
            const isSafari = /Safari/.test(ua) && !/Chrome/.test(ua);
            if (isIOS && !isSafari) showWarning('iOS 請使用系統自帶的 Safari 瀏覽器，否則語音功能無法啟動。');
        };
    </script>
</body>
</html>
