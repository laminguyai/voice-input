<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="語音助手">
    <meta name="theme-color" content="#667eea">
    
    <title>廣東話語音助手 v2.3</title>
    <style>
        /* 基礎樣式重置 */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* 容器優化：手機端全屏顯示 */
        .container {
            width: 100%;
            max-width: 100%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.98);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        /* 平板或電腦端才限制寬度 */
        @media (min-width: 768px) {
            .container { 
                max-width: 800px; 
                min-height: 95vh; 
                margin: 20px auto; 
                border-radius: 20px; 
                box-shadow: 0 20px 60px rgba(0,0,0,0.3); 
            }
        }

        /* 頁首樣式 */
        .header { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; 
            padding: 20px; 
            text-align: center; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
        }
        .header h1 { font-size: 1.4em; margin-bottom: 5px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .header p { opacity: 0.8; font-size: 0.85em; }

        /* 主內容區域佈局 */
        .main-content { 
            padding: 20px; 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            overflow-y: auto; 
        }

        .warning-box { background: #fff3cd; border: 1px solid #ffeaa7; border-radius: 12px; padding: 12px; font-size: 0.85em; color: #856404; display: none; }
        .warning-box.show { display: block; }

        /* 統計卡片 */
        .stats { display: flex; gap: 12px; }
        .stat-box { background: #f8f9fa; border: 1px solid #eee; padding: 12px; border-radius: 15px; flex: 1; text-align: center; }
