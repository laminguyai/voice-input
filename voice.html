<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.jpeg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="語音助手">
    <meta name="theme-color" content="#101010">
    
    <title>廣東話語音助手 v3.3</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif;
            background: #101010;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            color: #eee;
        }

        .container {
            width: 100%;
            max-width: 100%;
            margin: 0 auto;
            background: #101010;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 768px) {
            .container { max-width: 600px; min-height: 95vh; margin: 20px auto; border-radius: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        }

        /* 頁首 */
        .header { 
            padding: 30px 20px 10px; 
            text-align: center; 
        }
        .header h1 { font-size: 1.5em; display: flex; flex-direction: column; align-items: center; gap: 10px; font-weight: 600; }
        .header .top-mic { width: 32px; height: 32px; color: #6ee7b7; margin-bottom: 5px; }

        .main-content { padding: 20px; flex: 1; display: flex; flex-direction: column; gap: 20px; }

        .stats { display: flex; gap: 12px; }
        .stat-box { background: #1e1e1e; padding: 15px; border-radius: 18px; flex: 1; text-align: center; border: 1px solid #222; }
        .stat-box .number { font-size: 1.6em; font-weight: bold; color: #6ee7b7; }
        .stat-box .label { font-size: 0.8em; color: #777; margin-top: 4px; }

        /* 輸入顯示區 */
        .input-display {
            background: #1e1e1e; border: 1px solid #333; border-radius: 20px; padding: 20px;
            font-size: 1.15em; line-height: 1.6; color: #eee; min-height: 160px; max-height: 250px;
            overflow-y: auto; outline: none;
        }
        .input-display:empty:before { content: "點擊下方按鈕開始錄音..."; color: #444; font-style: italic; }
        .char-count { text-align: right; font-size: 0.8em; color: #555; margin-top: 6px; padding-right: 10px; }

        /* 功能按鈕區 */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn {
            padding: 15px; border: none; border-radius: 16px; cursor: pointer;
            font-size: 1.1em; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px;
            background: #262626; color: white; transition: all 0.2s;
        }
        .btn:active { transform: scale(0.96); background: #333; }
        .btn-icon { width: 22px; height: 22px; }
        .btn-danger { color: #f87171; }

        /* 錄音按鈕 (單手操作優化) */
        .mic-section { 
            text-align: center; 
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .mic-button {
            width: 90px; height: 90px; border-radius: 50%; border: none;
            background: #262626; color: white;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            touch-action: manipulation;
        }
        .mic-button .btn-icon { width: 45px; height: 45px; } 

        .mic-button.recording { 
            background: linear-gradient(135deg, #34d399 0%, #6ee7b7 100%); 
            transform: scale(1.1);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(110, 231, 183, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(110, 231, 183, 0); }
            100% { box-shadow: 0 0 0 0 rgba(110, 231, 183, 0); }
        }

        .status { font-size: 1em; color: #777; font-weight: 500; }
        .status.recording { color: #6ee7b7; font-weight: bold; }

        /* 歷史記錄 (點擊重用) */
        .history-section { border-top: 1px solid #222; padding-top: 25px; margin-top: 10px; }
        .history-section h3 { font-size: 1.2em; color: #eee; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        
        .history-item { 
            background: #1a1a1a; padding: 18px; margin-bottom: 12px; border-radius: 20px; 
            position: relative; border: 1px solid #222; 
            cursor: pointer; /* 顯示為可點擊 */
            transition: background 0.2s;
        }
        .history-item:active { background: #262626; }
        .history-item .date { font-size: 0.8em; color: #555; margin-bottom: 8px; }
        .history-item .text { font-size: 1.05em; color: #ddd; padding-right: 70px; line-height: 1.5; }
        .history-item .actions { position: absolute; top: 18px; right: 18px; display: flex; gap: 10px; }
        
        .icon-btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: #262626; color: #6ee7b7; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .icon-btn.delete { color: #f87171; }

        .toast {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: #262626; color: #6ee7b7; padding: 14px 28px;
            border-radius: 30px; font-size: 0.95em; opacity: 0; transition: 0.3s; z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div id="topMicContainer"></div>
            <h1>廣東話語音助手</h1>
        </div>

        <div class="main-content">
            <div class="stats">
                <div class="stat-box"><div class="number" id="totalCount">0</div><div class="label">總記錄</div></div>
                <div class="stat-box"><div class="number" id="todayCount">0</div><div class="label">今日</div></div>
            </div>

            <div class="input-wrapper">
                <div class="input-display" id="inputDisplay" contenteditable="true"></div>
                <div class="char-count" id="charCount">0 字</div>
            </div>

            <div class="controls">
                <button class="btn" onclick="saveToHistory()" id="saveBtn"></button>
                <button class="btn" onclick="shareText()" id="shareBtn"></button>
                <button class="btn" onclick="copyText()" id="copyBtn"></button>
                <button class="btn" onclick="clearInput()" id="clearBtn"></button>
                <button class="btn" onclick="exportData()" id="exportBtn"></button>
                <button class="btn btn-danger" onclick="clearAllHistory()" id="clearAllBtn"></button>
            </div>

            <div class="mic-section">
                <button class="mic-button" id="micBtn"></button>
                <div class="status" id="status">點擊按鈕說話</div>
            </div>

            <div class="history-section">
                <h3 id="historyTitle"></h3>
                <div id="historyList"></div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // SVG 圖標定義
        const iconSvg = {
            mic: `<svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>`,
            save: `<svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>`,
            share: `<svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>`,
            copy: `<svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`,
            clear: `<svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>`,
            export: `<svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>`,
            history: `<svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>`,
        };

        // 渲染 UI 圖標
        document.getElementById('topMicContainer').innerHTML = `<div class="top-mic">${iconSvg.mic}</div>`;
        document.getElementById('micBtn').innerHTML = iconSvg.mic;
        document.getElementById('saveBtn').innerHTML = `${iconSvg.save} 儲存`;
        document.getElementById('shareBtn').innerHTML = `${iconSvg.share} 分享`;
        document.getElementById('copyBtn').innerHTML = `${iconSvg.copy} 複製`;
        document.getElementById('clearBtn').innerHTML = `${iconSvg.clear} 清空`;
        document.getElementById('exportBtn').innerHTML = `${iconSvg.export} 匯出`;
        document.getElementById('clearAllBtn').innerHTML = `${iconSvg.clear} 全刪`;
        document.getElementById('historyTitle').innerHTML = `${iconSvg.history} 歷史記錄`;

        // Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log(err));
        }

        // 語音核心邏輯
        let recognition = null, isRecording = false, finalTranscript = '', interimTranscript = '', silenceTimer = null, wakeLock = null;
        const STORAGE_KEY = 'cantonese_voice_v2';

        const inputDisplay = document.getElementById('inputDisplay');
        const charCount = document.getElementById('charCount');
        const micBtn = document.getElementById('micBtn');

        function initRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return false;
            recognition = new SpeechRecognition();
            recognition.lang = 'zh-HK';
            recognition.interimResults = true;
            recognition.onstart = () => { 
                isRecording = true; 
                micBtn.classList.add('recording');
                document.getElementById('status').textContent = '正在聆聽...';
                document.getElementById('status').classList.add('recording');
                startSilenceTimer();
            };
            recognition.onend = () => {
                isRecording = false;
                micBtn.classList.remove('recording');
                if (micBtn.classList.contains('auto-restart')) {
                    recognition.start();
                } else {
                    document.getElementById('status').textContent = '點擊按鈕說話';
                    document.getElementById('status').classList.remove('recording');
                }
            };
            recognition.onresult = (event) => {
                resetSilenceTimer();
                let interim = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript;
                    else interim += event.results[i][0].transcript;
                }
                inputDisplay.textContent = finalTranscript + interim;
                charCount.textContent = (finalTranscript + interim).length + ' 字';
            };
            recognition.onerror = (e) => { if(e.error === 'no-speech') stopRecording(); };
            return true;
        }

        function startSilenceTimer() {
            clearTimeout(silenceTimer);
            silenceTimer = setTimeout(() => { if(isRecording) stopRecording(); }, 4000);
        }
        function resetSilenceTimer() { if(isRecording) startSilenceTimer(); }

        async function startRecording() {
            if (!recognition && !initRecognition()) return;
            finalTranscript = inputDisplay.textContent;
            micBtn.classList.add('auto-restart');
            try { 
                if('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
                recognition.start(); 
            } catch (e) {}
        }

        function stopRecording() {
            micBtn.classList.remove('auto-restart');
            clearTimeout(silenceTimer);
            if(recognition) recognition.stop();
            if(wakeLock) { wakeLock.release(); wakeLock = null; }
        }

        micBtn.addEventListener('click', () => isRecording ? stopRecording() : startRecording());

        // 核心功能：點擊重用 (載入內容)
        function loadToInput(text) {
            finalTranscript = text;
            interimTranscript = '';
            inputDisplay.textContent = text;
            charCount.textContent = text.length + ' 字';
            sessionStorage.setItem('draft', text);
            showToast('✅ 已載入內容');
            // 平滑滾動回頂部以便編輯
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 歷史與功能
        function saveToHistory() {
            const text = inputDisplay.textContent.trim();
            if(!text) return;
            const records = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            records.unshift({ id: Date.now(), text, date: new Date().toLocaleString('zh-HK', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}) });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(records.slice(0, 20)));
            renderHistory(); updateStats(); showToast('已儲存');
        }

        function renderHistory() {
            const records = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            document.getElementById('historyList').innerHTML = records.map(r => `
                <div class="history-item" onclick="loadToInput('${r.text.replace(/'/g, "\\'")}')">
                    <div class="date">${r.date}</div>
                    <div class="text">${escapeHtml(r.text)}</div>
                    <div class="actions">
                        <button class="icon-btn" onclick="event.stopPropagation(); copyRecordText('${r.text.replace(/'/g, "\\'")}')">${iconSvg.copy}</button>
                        <button class="icon-btn delete" onclick="event.stopPropagation(); deleteRecord(${r.id})">${iconSvg.clear}</button>
                    </div>
                </div>
            `).join('');
        }

        function copyRecordText(t) { navigator.clipboard.writeText(t); showToast('已複製'); }
        function copyText() { copyRecordText(inputDisplay.textContent); }
        function clearInput() { finalTranscript = ''; inputDisplay.textContent = ''; charCount.textContent = '0 字'; }
        
        function deleteRecord(id) {
            const records = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            localStorage.setItem(STORAGE_KEY, JSON.stringify(records.filter(r => r.id !== id)));
            renderHistory(); updateStats();
        }
        
        function clearAllHistory() { if(confirm('確定全刪？')) { localStorage.removeItem(STORAGE_KEY); renderHistory(); updateStats(); } }
        
        function shareText() {
            const t = inputDisplay.textContent;
            if(navigator.share) navigator.share({text: t}); else copyText();
        }
        
        function exportData() {
            const r = localStorage.getItem(STORAGE_KEY);
            const blob = new Blob([r], {type: 'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `records.json`; a.click();
        }
        
        function updateStats() {
            const r = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            document.getElementById('totalCount').textContent = r.length;
            document.getElementById('todayCount').textContent = r.filter(x => new Date(x.id).toDateString() === new Date().toDateString()).length;
        }
        
        function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        window.onload = () => { renderHistory(); updateStats(); };
    </script>
</body>
</html>
