        body {

        @media (min-width: 768px) {

        .main-content { padding: 15px; flex: 1; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }

        .mic-section { text-align: center; padding: 20px 0; background: #fdfdfd; border-radius: 20px; border: 1px dashed #ddd; margin: 5px 0; }
        .mic-button {
            width: 85px; height: 85px; border-radius: 50%; border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; font-size: 32px; cursor: pointer;
            box-shadow: 0 6px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.2s; position: relative; touch-action: manipulation;
        }
        .mic-button:active { transform: scale(0.9); }
        .mic-button.recording { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(245, 87, 108, 0.6); }
            70% { box-shadow: 0 0 0 15px rgba(245, 87, 108, 0); }
            100% { box-shadow: 0 0 0 0 rgba(245, 87, 108, 0); }
        }

        .status { margin-top: 10px; font-size: 0.9em; color: #666; font-weight: 500; }
        .status.recording { color: #f5576c; }

        .input-display {
            background: #fff; border: 2px solid #f0f0f0; border-radius: 15px; padding: 15px;
            font-size: 1.1em; line-height: 1.6; color: #333; min-height: 120px; max-height: 200px;
            overflow-y: auto; -webkit-overflow-scrolling: touch; outline: none;
        }
        .input-display:empty:before { content: "點擊開始錄音..."; color: #ccc; }
        .char-count { text-align: right; font-size: 0.75em; color: #999; margin-top: 4px; }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn {

            font-size: 0.95em; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-success { background: #2ecc71; color: white; }
        .btn-secondary { background: #f0f0f0; color: #555; }
        .btn-danger { background: #fee; color: #e74c3c; }
        .btn-full { grid-column: 1 / -1; }
